<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Situação das Obras - GovWorks</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .scroll-custom::-webkit-scrollbar { width: 6px; }
        .scroll-custom::-webkit-scrollbar-track { background: #f1f5f9; }
        .scroll-custom::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    </style>
</head>
<body class="bg-slate-100 p-4 font-sans text-slate-800">

    <div class="flex flex-col md:flex-row justify-between items-center mb-6 bg-white p-3 rounded-xl shadow-sm sticky top-0 z-30">
        <div class="flex items-center gap-4 w-full md:w-auto">
            <div class="relative group w-full md:w-64">
                <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                    <i class="fas fa-bars text-slate-500"></i>
                </div>
                <select onchange="location = this.value;" class="bg-slate-50 border border-slate-300 text-slate-700 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full pl-10 p-2.5 font-bold cursor-pointer">
                    <option value="/">📍 Monitoramento Geográfico</option>
                    <option value="/evolucao">📅 Evolução Temporal</option>
                    <option value="/financeiros">💰 Investimentos Totais</option>
                    <option value="/situacao" selected>🚧 Situação das Obras</option>
                    <option value="/classificacao">🏗️ Tipo e Natureza</option>
                </select>
            </div>
            
            <nav class="hidden md:flex text-sm bg-slate-50 px-3 py-2 rounded-md border border-slate-100">
                <ol class="inline-flex items-center space-x-1">
                    <li>
                        <button onclick="resetToCountry()" class="text-slate-600 hover:text-blue-600 font-bold flex items-center">
                            <i class="fas fa-globe-americas mr-1"></i> BRASIL
                        </button>
                    </li>
                    <li id="crumb-uf" class="hidden flex items-center">
                        <i class="fas fa-chevron-right text-slate-300 mx-2 text-xs"></i>
                        <span id="crumb-uf-text" class="text-blue-600 font-bold">--</span>
                    </li>
                </ol>
            </nav>
        </div>
        
        <div class="bg-slate-100 p-1 rounded-lg flex mt-2 md:mt-0">
            <button onclick="changeSource('legado')" id="btn-legado" class="active-btn text-xs px-3 py-1 rounded bg-white font-bold text-blue-600 border">
                <i class="fas fa-landmark mr-1"></i> LEGADO
            </button>
            <button onclick="changeSource('novo')" id="btn-novo" class="inactive-btn text-xs ml-1 px-3 py-1 rounded text-slate-500 hover:bg-white transition">
                <i class="fas fa-rocket mr-1"></i> NOVO
            </button>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        
        <div class="card bg-white p-4 rounded-xl shadow-sm border border-slate-200">
            <h3 class="font-bold text-slate-700 mb-4 border-b pb-2 flex items-center">
                <i class="fas fa-traffic-light text-blue-500 mr-2"></i>Status Atual das Obras
            </h3>
            <div class="h-80 flex justify-center relative">
                <canvas id="chartStatus"></canvas>
            </div>
            <p class="text-xs text-slate-400 mt-2 text-center">Passe o mouse sobre as cores para ver a % do total.</p>
        </div>

        <div id="cardExecucao" class="card bg-white p-4 rounded-xl shadow-sm border border-slate-200">
            <h3 class="font-bold text-slate-700 mb-4 border-b pb-2 flex items-center">
                <i class="fas fa-hammer text-emerald-500 mr-2"></i>Média de Execução Física (%)
            </h3>
            <div class="h-80 relative cursor-pointer">
                <canvas id="chartExecucao"></canvas>
            </div>
            <p class="text-xs text-slate-400 mt-2 text-center"><i class="fas fa-hand-pointer"></i> Clique na barra do Estado para listar as obras e sua execução.</p>
        </div>

        <div id="works-section" class="col-span-1 md:col-span-2 card bg-white rounded-xl shadow-md border border-slate-200 hidden mt-4 mb-8">
            <div class="p-4 border-b flex justify-between items-center bg-slate-50 rounded-t-lg">
                <h3 id="works-title" class="font-bold text-lg text-slate-800 flex items-center">
                    <i class="fas fa-list-ol mr-2 text-blue-600"></i> Obras do Estado
                </h3>
            </div>
            
            <div class="overflow-x-auto max-h-[500px] overflow-y-auto scroll-custom">
                <table class="w-full text-left text-sm">
                    <thead class="bg-white text-slate-500 sticky top-0 shadow-sm z-10">
                        <tr>
                            <th class="p-3 w-24 font-semibold border-b">ID</th>
                            <th class="p-3 font-semibold border-b">Objeto / Descrição</th>
                            <th class="p-3 font-semibold border-b w-32">Espécie</th>
                            <th class="p-3 font-semibold border-b">Município</th>
                            <th class="p-3 text-right font-semibold border-b w-48">Execução Física</th>
                        </tr>
                    </thead>
                    <tbody id="works-body" class="divide-y divide-slate-100 bg-white">
                        </tbody>
                </table>
            </div>
        </div>

    </div>

    <script src="{{ url_for('static', filename='js/situacao.js') }}"></script>
</body>
</html>
