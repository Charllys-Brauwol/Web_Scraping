<!DOCTYPE html> <!-- Define que o documento é HTML5 -->
<html lang="pt-br"> <!-- Início do HTML e idioma português do Brasil -->

<head> <!-- Cabeçalho da página -->
    <meta charset="UTF-8"> <!-- Define codificação UTF-8 -->
    <title>Tipologia - GovWorks</title> <!-- Título da aba do navegador -->

    <script src="https://cdn.tailwindcss.com"></script> <!-- Importa Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> <!-- Importa Chart.js (gráficos) -->

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"> <!-- Importa ícones -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"> <!-- CSS do projeto (Flask) -->
</head>

<body class="bg-slate-100 p-4 font-sans text-slate-800"> <!-- Corpo com estilos Tailwind -->

    <div class="flex justify-between items-center mb-6 bg-white p-3 rounded-xl shadow-sm"> <!-- Barra superior -->
        
        <div class="flex items-center gap-4"> <!-- Container interno -->
            
            <div class="relative"> <!-- Container do select -->
                
                <select onchange="location = this.value;" class="bg-slate-100 border border-slate-300 text-slate-700 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 font-bold cursor-pointer"> <!-- Menu de navegação -->
                    <option value="/">📍 Monitoramento Geográfico</option> <!-- Opção -->
                    <option value="/evolucao">📅 Evolução Temporal</option> <!-- Opção -->
                    <option value="/financeiros">💰 Investimentos Totais</option> <!-- Opção -->
                    <option value="/situacao">🚧 Situação das Obras</option> <!-- Opção -->
                    <option value="/classificacao" selected>🏗️ Tipo e Natureza</option> <!-- Opção selecionada -->
                </select>

            </div>

            <h1 class="text-xl font-bold text-slate-600 pl-4 border-l">Classificação das Intervenções</h1> <!-- Título da página -->
        </div>
        
        <div class="bg-slate-100 p-1 rounded-lg flex"> <!-- Botões de troca de fonte -->
            <button onclick="changeSource('legado')" id="btn-legado" class="active-btn text-xs">🏛️ LEGADO</button> <!-- Botão legado -->
            <button onclick="changeSource('novo')" id="btn-novo" class="inactive-btn text-xs ml-1">🆕 NOVO</button> <!-- Botão novo -->
        </div>

    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6"> <!-- Layout em grid -->
        
        <div class="card bg-white p-4 rounded-xl shadow-sm"> <!-- Card 1 -->
            
            <h3 class="font-bold text-slate-700 mb-4 border-b pb-2"> <!-- Título -->
                <i class="fas fa-hammer text-blue-500 mr-2"></i>Tipo de Intervenção <!-- Ícone + texto -->
            </h3>

            <div class="h-80 flex justify-center"> <!-- Área do gráfico -->
                <canvas id="chartNatureza"></canvas> <!-- Canvas do gráfico -->
            </div>

            <p class="text-xs text-slate-400 mt-2 text-center">Classificação: Obra Nova, Reforma, Ampliação etc.</p> <!-- Descrição -->
        </div>

        <div class="card bg-white p-4 rounded-xl shadow-sm"> <!-- Card 2 -->
            
            <h3 class="font-bold text-slate-700 mb-4 border-b pb-2"> <!-- Título -->
                <i class="fas fa-users text-emerald-500 mr-2"></i>Função Social (Área) <!-- Ícone + texto -->
            </h3>

            <div class="h-80"> <!-- Área do gráfico -->
                <canvas id="chartFuncao"></canvas> <!-- Canvas do gráfico -->
            </div>

            <p class="text-xs text-slate-400 mt-2 text-center">Áreas mais frequentes (Saúde, Educação, Infraestrutura).</p> <!-- Descrição -->
        </div>

    </div>

    <script src="{{ url_for('static', filename='js/classificacao.js') }}"></script> <!-- Script JS da página -->
</body>

</html> <!-- Fim do documento -->
